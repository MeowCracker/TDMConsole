name: Docker image

# Build and publish the web-mode container to GHCR.
# Consumers then just:  docker run -d -p 8080:8080 -v tdm-data:/data ghcr.io/<owner>/tdmconsole
on:
  workflow_dispatch: {}
  push:
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodule — image bundles the pristine upstream)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Pull the engine submodule to the latest upstream master so each release
      # ships the freshest miner, then expose its short commit hash for the
      # build (baked into the image via a build-arg — the image has no .git).
      - name: Update engine submodule to latest upstream
        id: engine
        run: |
          git submodule update --remote TwitchDropsMiner
          echo "hash=$(git -C TwitchDropsMiner rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercase the owner — GHCR repository names must be lowercase, but
      # github.repository_owner can contain uppercase (e.g. MeowCracker).
      - name: Compute image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/tdmconsole" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=TDMConsole
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # workflow_dispatch is an explicit publish action. A tag dispatch also
      # receives the semver tags generated above in addition to :latest.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            ENGINE_COMMIT=${{ steps.engine.outputs.hash }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
