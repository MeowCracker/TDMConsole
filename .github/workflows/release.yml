name: Release binaries

# On a version tag, build a single-file CLI executable for each platform. macOS
# additionally publishes a GUI .app archive and an installable DMG.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # needed to create/update the Release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: tdmconsole-windows-x64.exe
            build_name: tdmconsole.exe
            artifact_name: tdmconsole-windows-x64
            artifact_paths: dist/tdmconsole-windows-x64.exe
          - os: ubuntu-22.04            # older glibc → wider Linux compatibility
            asset: tdmconsole-linux-x64
            build_name: tdmconsole
            artifact_name: tdmconsole-linux-x64
            artifact_paths: dist/tdmconsole-linux-x64
          - os: macos-15-intel
            asset: tdmconsole-macos-x64
            build_name: tdmconsole
            macos_suffix: macos-x64
            artifact_name: tdmconsole-macos-x64
            artifact_paths: |
              dist/tdmconsole-macos-x64
              dist/TDMConsole-macos-x64.app.zip
              dist/TDMConsole-macos-x64.dmg
          - os: macos-14                # Apple Silicon runner
            asset: tdmconsole-macos-arm64
            build_name: tdmconsole
            macos_suffix: macos-arm64
            artifact_name: tdmconsole-macos-arm64
            artifact_paths: |
              dist/tdmconsole-macos-arm64
              dist/TDMConsole-macos-arm64.app.zip
              dist/TDMConsole-macos-arm64.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout (with submodule — PyInstaller bundles the upstream code)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Pull the engine submodule up to the latest upstream commit so releases
      # ship the newest miner. The spec freezes this commit's short hash into
      # the binary (shown by --version). Windows needs the same git command.
      - name: Update engine submodule to latest upstream
        run: git submodule update --remote --recursive TwitchDropsMiner

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python and locked dependencies
        run: |
          uv python install 3.12
          uv sync --frozen --group build --python 3.12

      - name: Install DMG tooling
        if: runner.os == 'macOS'
        uses: gerlero/brew-install@v1
        with:
          packages: create-dmg

      - name: Build executable and macOS app
        run: uv run pyinstaller --clean --noconfirm tdmconsole.spec

      - name: Rename to platform asset name (unix)
        if: runner.os != 'Windows'
        run: mv "dist/${{ matrix.build_name }}" "dist/${{ matrix.asset }}"

      - name: Rename to platform asset name (windows)
        if: runner.os == 'Windows'
        run: Move-Item "dist/${{ matrix.build_name }}" "dist/${{ matrix.asset }}"

      - name: Package signed macOS app and DMG
        if: runner.os == 'macOS'
        run: |
          chmod +x scripts/package-macos.sh
          ./scripts/package-macos.sh "${{ matrix.macos_suffix }}"

      - name: Smoke test (--version must run from the frozen binary)
        if: runner.os != 'Windows'
        run: ./dist/${{ matrix.asset }} --version

      # Always publish the binary as a workflow artifact — lets a manual
      # (workflow_dispatch) run be downloaded and tested without a tag/Release.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

      # Attach to the GitHub Release only on a version-tag push — a Release
      # needs a tag, so this step is skipped for manual runs (which have none).
      - name: Upload as Release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_paths }}
          fail_on_unmatched_files: true
