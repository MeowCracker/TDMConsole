name: Release binaries

# On a version tag, build a single-file executable for each platform with
# PyInstaller (upstream submodule + lang/ + web/static all bundled in) and
# attach them to the GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # needed to create/update the Release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: tdmconsole-windows-x64.exe
            build_name: tdmconsole.exe
          - os: ubuntu-22.04            # older glibc → wider Linux compatibility
            asset: tdmconsole-linux-x64
            build_name: tdmconsole
          - os: macos-14                # Apple Silicon runner
            asset: tdmconsole-macos-arm64
            build_name: tdmconsole
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout (with submodule — PyInstaller bundles the upstream code)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller aiohttp "textual>=8.2.8" truststore yarl

      - name: Build single-file executable
        run: pyinstaller --clean --noconfirm tdmconsole.spec

      - name: Rename to platform asset name (unix)
        if: runner.os != 'Windows'
        run: mv "dist/${{ matrix.build_name }}" "dist/${{ matrix.asset }}"

      - name: Rename to platform asset name (windows)
        if: runner.os == 'Windows'
        run: Move-Item "dist/${{ matrix.build_name }}" "dist/${{ matrix.asset }}"

      - name: Smoke test (--version must run from the frozen binary)
        if: runner.os != 'Windows'
        run: ./dist/${{ matrix.asset }} --version

      - name: Upload as Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          fail_on_unmatched_files: true
