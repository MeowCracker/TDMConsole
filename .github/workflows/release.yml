name: Release binaries

# Build platform-native release assets. macOS puts the GUI .app inside the DMG;
# the standalone CLI is distributed as a tar.gz archive.
on:
  workflow_dispatch: {}

permissions:
  contents: write   # needed to create/update the Release and upload assets

jobs:
  prepare:
    name: Prepare build version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Resolve short commit version
        id: version
        shell: bash
        run: |
          version="$(git rev-parse --short HEAD)"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            release_tag="$GITHUB_REF_NAME"
          else
            release_tag="build-$version"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: TDMConsole-windows-x64.exe
            build_name: tdmconsole.exe
            release_name: TDMConsole-windows-x64.exe
          - os: ubuntu-22.04            # older glibc → wider Linux compatibility
            asset: TDMConsole-linux-x64
            build_name: tdmconsole
            release_name: TDMConsole-linux-x64.tar.gz
          - os: macos-15-intel
            asset: TDMConsole-macos-x64
            build_name: tdmconsole
            macos_suffix: macos-x64
            release_name: TDMConsole-macos-x64.tar.gz
          - os: macos-14                # Apple Silicon runner
            asset: TDMConsole-macos-arm64
            build_name: tdmconsole
            macos_suffix: macos-arm64
            release_name: TDMConsole-macos-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout (with submodule — PyInstaller bundles the upstream code)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Pull the engine submodule up to the latest upstream commit so releases
      # ship the newest miner. The spec freezes this commit's short hash into
      # the binary (shown by --version). Windows needs the same git command.
      - name: Update engine submodule to latest upstream
        run: git submodule update --remote --recursive TwitchDropsMiner

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python and locked dependencies
        run: |
          uv python install 3.12
          uv sync --frozen --group build --python 3.12

      - name: Install DMG tooling
        if: runner.os == 'macOS'
        uses: gerlero/brew-install@v1
        with:
          packages: create-dmg

      - name: Build executable and macOS app
        env:
          TDM_BUILD_VERSION: ${{ needs.prepare.outputs.version }}
        run: uv run pyinstaller --clean --noconfirm tdmconsole.spec

      - name: Rename to platform asset name (unix)
        if: runner.os != 'Windows'
        run: mv "dist/${{ matrix.build_name }}" "dist/${{ matrix.asset }}"

      - name: Rename to platform asset name (windows)
        if: runner.os == 'Windows'
        run: Move-Item "dist/${{ matrix.build_name }}" "dist/${{ matrix.asset }}"

      - name: Package signed macOS app and DMG
        if: runner.os == 'macOS'
        env:
          TDM_BUILD_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          chmod +x scripts/package-macos.sh
          ./scripts/package-macos.sh "${{ matrix.macos_suffix }}"

      - name: Smoke test (--version must run from the frozen binary)
        if: runner.os != 'Windows'
        run: ./dist/${{ matrix.asset }} --version

      - name: Archive Unix executable
        if: runner.os != 'Windows'
        run: tar -czf "dist/${{ matrix.release_name }}" -C dist "${{ matrix.asset }}"

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.release_name }}
          path: dist/${{ matrix.release_name }}
          if-no-files-found: error

      - name: Upload macOS DMG artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: TDMConsole-${{ matrix.macos_suffix }}.dmg
          path: dist/TDMConsole-${{ matrix.macos_suffix }}.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: github.event_name != 'pull_request'
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: TDMConsole ${{ needs.prepare.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
